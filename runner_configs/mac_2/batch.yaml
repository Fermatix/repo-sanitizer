# Batch configuration for repo-sanitizer.
#
# Usage examples:
#   All partners:        repo-sanitizer batch run --config examples/batch.yaml
#   Specific partners:   repo-sanitizer batch run --config examples/batch.yaml --partner acme-corp
#   Specific repos:      repo-sanitizer batch run --config examples/batch.yaml --repo acme-corp/backend-api
#   Retry failed:        repo-sanitizer batch run --config examples/batch.yaml --retry-failed
#   List repos (dry):    repo-sanitizer batch list --config examples/batch.yaml

# ---------------------------------------------------------------------------
# GitLab connection
# ---------------------------------------------------------------------------
gitlab:
  url: https://gitlab.com            # host URL only (no group/project path)
  token_env: GITLAB_TOKEN           # env var holding the Personal Access Token
                                    # (needs read_api + read_repository on source group,
                                    #  api + write_repository on delivery group)
  source_group: doubletapp/data-llm/partner-private-repos
  delivery_group: doubletapp/data-llm/partner-private-repos-delivery
  clone_depth: 0                    # 0 = full history (required for history rewrite)

# ---------------------------------------------------------------------------
# Scope — which repos to process.
# Priority: repos > partners > all (highest to lowest).
# Use CLI flags --partner / --repo to override at runtime.
# ---------------------------------------------------------------------------
