# ---------------------------------------------------------------------------
# Rulepack (same as --rulepack in single-repo mode)
# ---------------------------------------------------------------------------
rulepack: examples/rules

# Salt env var (same as --salt-env in single-repo mode)
salt_env: REPO_SANITIZER_SALT

# ---------------------------------------------------------------------------
# Parallelization
# ---------------------------------------------------------------------------
processing:
  workers: 24                       # parallel worker processes (set to CPU core count)
  ner_service_port: 8765            # local port for the shared NER HTTP service
  ner_batch_size: 128                # GPU inference batch size
  work_base_dir: /tmp/repo-san-work # temporary working directory per repo
  keep_work_dirs: false             # delete work dirs after successful push

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  artifacts_dir: ./batch-artifacts  # persistent artifacts: <dir>/<partner>/<repo>/
  state_file: ./batch_state.json    # progress tracking (enables resume / --retry-failed)
