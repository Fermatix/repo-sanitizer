    - id: beancount
      grammar_package: tree-sitter-beancount
      file_extensions: [.beancount, .bean]
      extract_zones: [comment_line, string_literal]

    # ── Data formats ──────────────────────────────────────────────────────
    - id: yaml
      grammar_package: tree-sitter-yaml
      file_extensions: [.yaml, .yml]
      extract_zones: [comment_line, string_literal]

    - id: toml
      grammar_package: tree-sitter-toml
      file_extensions: [.toml]
      extract_zones: [comment_line, string_literal]

    - id: json
      grammar_package: tree-sitter-json
