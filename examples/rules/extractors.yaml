    - id: ini
      grammar_package: tree-sitter-ini
      file_extensions: [.ini, .cfg]
      extract_zones: [comment_line, string_literal]

    - id: properties
      grammar_package: tree-sitter-properties
      file_extensions: [.properties]
      extract_zones: [comment_line, string_literal]

    - id: ron
      grammar_package: tree-sitter-ron
      file_extensions: [.ron]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: kdl
      grammar_package: tree-sitter-kdl
      file_extensions: [.kdl]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Query / Schema ────────────────────────────────────────────────────
    - id: sql
      grammar_package: tree-sitter-sql
      file_extensions: [.sql]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: graphql
      grammar_package: tree-sitter-graphql
      file_extensions: [.graphql, .gql]
