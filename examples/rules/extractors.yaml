treesitter:
  languages:
    # ── Python ────────────────────────────────────────────────────────────
    - id: python
      grammar_package: tree-sitter-python
      file_extensions: [.py, .pyw, .pyi]
      extract_zones: [comment_line, comment_block, docstring, string_literal]

    # ── JavaScript / TypeScript ───────────────────────────────────────────
    - id: javascript
      grammar_package: tree-sitter-javascript
      file_extensions: [.js, .mjs, .cjs, .jsx]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: typescript
      grammar_package: tree-sitter-typescript
      file_extensions: [.ts]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: tsx
      grammar_package: tree-sitter-typescript
      file_extensions: [.tsx]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    # ── Web UI ────────────────────────────────────────────────────────────
    - id: html
      grammar_package: tree-sitter-html
      file_extensions: [.html, .htm, .xhtml]
      extract_zones: [comment_block, string_literal]

    - id: css
      grammar_package: tree-sitter-css
      file_extensions: [.css]
      extract_zones: [comment_block, string_literal]

    - id: scss
      grammar_package: tree-sitter-scss
      file_extensions: [.scss]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: svelte
      grammar_package: tree-sitter-svelte
      file_extensions: [.svelte]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: vue
      grammar_package: tree-sitter-vue
      file_extensions: [.vue]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: astro
      grammar_package: tree-sitter-astro
      file_extensions: [.astro]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: twig
      grammar_package: tree-sitter-twig
      file_extensions: [.twig]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: heex
      grammar_package: tree-sitter-heex
      file_extensions: [.heex]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: embedded_template
      grammar_package: tree-sitter-embedded-template
      file_extensions: [.erb, .ejs]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── C family ─────────────────────────────────────────────────────────
    - id: c
      grammar_package: tree-sitter-c
      file_extensions: [.c, .h]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: cpp
      grammar_package: tree-sitter-cpp
      file_extensions: [.cpp, .cc, .cxx, .c++, .hpp, .hxx, .h++, .hh]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: c_sharp
      grammar_package: tree-sitter-c-sharp
      file_extensions: [.cs]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: cuda
      grammar_package: tree-sitter-cuda
      file_extensions: [.cu, .cuh]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: objc
      grammar_package: tree-sitter-objc
      file_extensions: [.mm]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Systems languages ─────────────────────────────────────────────────
    - id: rust
      grammar_package: tree-sitter-rust
      file_extensions: [.rs]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: go
      grammar_package: tree-sitter-go
      file_extensions: [.go]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: zig
      grammar_package: tree-sitter-zig
      file_extensions: [.zig]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: odin
      grammar_package: tree-sitter-odin
      file_extensions: [.odin]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: v
      grammar_package: tree-sitter-v
      file_extensions: [.vsh]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: nim
      grammar_package: tree-sitter-nim
      file_extensions: [.nim, .nims]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: d
      grammar_package: tree-sitter-d
      file_extensions: [.d, .di]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: hare
      grammar_package: tree-sitter-hare
      file_extensions: [.ha]
      extract_zones: [comment_line, string_literal]

    - id: asm
      grammar_package: tree-sitter-asm
      file_extensions: [.s, .asm, .S]
      extract_zones: [comment_line, string_literal]

    # ── JVM ───────────────────────────────────────────────────────────────
    - id: java
      grammar_package: tree-sitter-java
      file_extensions: [.java]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: kotlin
      grammar_package: tree-sitter-kotlin
      file_extensions: [.kt, .kts]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: scala
      grammar_package: tree-sitter-scala
      file_extensions: [.scala, .sbt, .sc]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: groovy
      grammar_package: tree-sitter-groovy
      file_extensions: [.groovy, .gradle]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    # ── Apple / Mobile ────────────────────────────────────────────────────
    - id: swift
      grammar_package: tree-sitter-swift
      file_extensions: [.swift]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: dart
      grammar_package: tree-sitter-dart
      file_extensions: [.dart]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Scripting ─────────────────────────────────────────────────────────
    - id: ruby
      grammar_package: tree-sitter-ruby
      file_extensions: [.rb, .rake, .gemspec, .ru, .rbw]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: php
      grammar_package: tree-sitter-php
      file_extensions: [.php, .phtml, .php3, .php4, .php5, .php7, .php8]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: perl
      grammar_package: tree-sitter-perl
      file_extensions: [.pl, .pm, .t, .pod]
      extract_zones: [comment_line, string_literal]

    - id: lua
      grammar_package: tree-sitter-lua
      file_extensions: [.lua]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: luau
      grammar_package: tree-sitter-luau
      file_extensions: [.luau]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: tcl
      grammar_package: tree-sitter-tcl
      file_extensions: [.tcl, .tk]
      extract_zones: [comment_line, string_literal]

    - id: gdscript
      grammar_package: tree-sitter-gdscript
      file_extensions: [.gd]
      extract_zones: [comment_line, string_literal]

    - id: qmljs
      grammar_package: tree-sitter-qmljs
      file_extensions: [.qml]
      extract_zones: [comment_line, comment_block, string_literal, template_literal]

    - id: squirrel
      grammar_package: tree-sitter-squirrel
      file_extensions: [.nut]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Shell ─────────────────────────────────────────────────────────────
    - id: bash
      grammar_package: tree-sitter-bash
      file_extensions: [.sh, .bash, .zsh, .ksh, .bsh]
      extract_zones: [comment_line, string_literal]

    - id: fish
      grammar_package: tree-sitter-fish
      file_extensions: [.fish]
      extract_zones: [comment_line, string_literal]

    - id: powershell
      grammar_package: tree-sitter-powershell
      file_extensions: [.ps1, .psm1, .psd1]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Functional ────────────────────────────────────────────────────────
    - id: haskell
      grammar_package: tree-sitter-haskell
      file_extensions: [.hs, .lhs]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: ocaml
      grammar_package: tree-sitter-ocaml
      file_extensions: [.ml, .mly, .mll]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: ocaml_interface
      grammar_package: tree-sitter-ocaml
      file_extensions: [.mli]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: fsharp
      grammar_package: tree-sitter-fsharp
      file_extensions: [.fs, .fsi, .fsx]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: elixir
      grammar_package: tree-sitter-elixir
      file_extensions: [.ex, .exs]
      extract_zones: [comment_line, docstring, string_literal]

    - id: erlang
      grammar_package: tree-sitter-erlang
      file_extensions: [.erl, .hrl]
      extract_zones: [comment_line, string_literal]

    - id: elm
      grammar_package: tree-sitter-elm
      file_extensions: [.elm]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: purescript
      grammar_package: tree-sitter-purescript
      file_extensions: [.purs]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: clojure
      grammar_package: tree-sitter-clojure
      file_extensions: [.clj, .cljs, .cljc, .edn]
      extract_zones: [comment_line, string_literal]

    - id: scheme
      grammar_package: tree-sitter-scheme
      file_extensions: [.scm, .ss]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: racket
      grammar_package: tree-sitter-racket
      file_extensions: [.rkt, .rktl]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: commonlisp
      grammar_package: tree-sitter-commonlisp
      file_extensions: [.lisp, .lsp, .cl, .asd]
      extract_zones: [comment_line, string_literal]

    - id: fennel
      grammar_package: tree-sitter-fennel
      file_extensions: [.fnl]
      extract_zones: [comment_line, string_literal]

    - id: janet
      grammar_package: tree-sitter-janet
      file_extensions: [.janet]
      extract_zones: [comment_line, string_literal]

    - id: elisp
      grammar_package: tree-sitter-elisp
      file_extensions: [.el]
      extract_zones: [comment_line, string_literal]

    - id: haxe
      grammar_package: tree-sitter-haxe
      file_extensions: [.hx, .hxml]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: gleam
      grammar_package: tree-sitter-gleam
      file_extensions: [.gleam]
      extract_zones: [comment_line, string_literal]

    - id: pony
      grammar_package: tree-sitter-pony
      file_extensions: [.pony]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: agda
      grammar_package: tree-sitter-agda
      file_extensions: [.agda]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: hack
      grammar_package: tree-sitter-hack
      file_extensions: [.hack, .hhi]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Data science / Scientific ─────────────────────────────────────────
    - id: r
      grammar_package: tree-sitter-r
      file_extensions: [.r, .R]
      extract_zones: [comment_line, string_literal]

    - id: julia
      grammar_package: tree-sitter-julia
      file_extensions: [.jl]
      extract_zones: [comment_line, comment_block, docstring, string_literal]

    - id: matlab
      grammar_package: tree-sitter-matlab
      file_extensions: [.m, .mlx]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Legacy ────────────────────────────────────────────────────────────
    - id: cobol
      grammar_package: tree-sitter-cobol
      file_extensions: [.cob, .cbl, .cobol, .cpy]
      extract_zones: [comment_line, string_literal]

    - id: fortran
      grammar_package: tree-sitter-fortran
      file_extensions: [.f, .f90, .f95, .f03, .f08, .for, .fpp]
      extract_zones: [comment_line, string_literal]

    - id: ada
      grammar_package: tree-sitter-ada
      file_extensions: [.adb, .ads, .ada]
      extract_zones: [comment_line, string_literal]

    - id: pascal
      grammar_package: tree-sitter-pascal
      file_extensions: [.pas, .pp, .inc]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: actionscript
      grammar_package: tree-sitter-actionscript
      file_extensions: [.as]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Enterprise / Platforms ────────────────────────────────────────────
    - id: apex
      grammar_package: tree-sitter-sfapex
      file_extensions: [.cls, .apex, .trigger]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: bsl
      grammar_package: tree-sitter-bsl
      file_extensions: [.bsl, .os]
      extract_zones: [comment_line, string_literal]

    - id: arduino
      grammar_package: tree-sitter-arduino
      file_extensions: [.ino]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: magik
      grammar_package: tree-sitter-magik
      file_extensions: [.magik]
      extract_zones: [comment_line, string_literal]

    # ── Build / Config ────────────────────────────────────────────────────
    - id: gomod
      grammar_package: tree-sitter-go-mod
      file_extensions: [.mod]
      extract_zones: [comment_line, string_literal]

    - id: gosum
      grammar_package: tree-sitter-go-sum
      file_extensions: [.sum]
      extract_zones: [string_literal]

    - id: cmake
      grammar_package: tree-sitter-cmake
      file_extensions: [.cmake]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: make
      grammar_package: tree-sitter-make
      file_extensions: [.mk, .mak]
      extract_zones: [comment_line, string_literal]

    - id: meson
      grammar_package: tree-sitter-meson
      file_extensions: [.meson]
      extract_zones: [comment_line, string_literal]

    - id: ninja
      grammar_package: tree-sitter-ninja
      file_extensions: [.ninja]
      extract_zones: [comment_line, string_literal]

    - id: starlark
      grammar_package: tree-sitter-starlark
      file_extensions: [.star, .bzl]
      extract_zones: [comment_line, string_literal]

    - id: nix
      grammar_package: tree-sitter-nix
      file_extensions: [.nix]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: bitbake
      grammar_package: tree-sitter-bitbake
      file_extensions: [.bb, .bbclass, .bbappend, .bbmask]
      extract_zones: [comment_line, string_literal]

    - id: puppet
      grammar_package: tree-sitter-puppet
      file_extensions: [.pp]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: gn
      grammar_package: tree-sitter-gn
      file_extensions: [.gn, .gni]
      extract_zones: [comment_line, string_literal]

    - id: hcl
      grammar_package: tree-sitter-hcl
      file_extensions: [.hcl, .tf, .tfvars]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: bicep
      grammar_package: tree-sitter-bicep
      file_extensions: [.bicep]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: prisma
      grammar_package: tree-sitter-prisma
      file_extensions: [.prisma]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: rego
      grammar_package: tree-sitter-rego
      file_extensions: [.rego]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: dockerfile
      grammar_package: tree-sitter-dockerfile
      file_extensions: [.dockerfile]
