      extract_zones: [comment_line, string_literal]

    - id: proto
      grammar_package: tree-sitter-proto
      file_extensions: [.proto]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: smithy
      grammar_package: tree-sitter-smithy
      file_extensions: [.smithy]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: thrift
