      file_extensions: [.thrift]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: capnp
      grammar_package: tree-sitter-capnp
      file_extensions: [.capnp]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Markup / Docs ─────────────────────────────────────────────────────
    - id: xml
      grammar_package: tree-sitter-xml
      file_extensions: [.xml, .xsd, .xsl, .xslt, .rss, .atom, .svg]
      extract_zones: [comment_block, string_literal]

    - id: dtd
      grammar_package: tree-sitter-xml
      file_extensions: [.dtd]
      extract_zones: [comment_block, string_literal]

    - id: markdown
      grammar_package: tree-sitter-markdown
      file_extensions: [.md, .markdown]
      extract_zones: [comment_block, string_literal]

    - id: latex
      grammar_package: tree-sitter-latex
      file_extensions: [.tex, .latex, .sty, .ltx]
      extract_zones: [comment_line, string_literal]

    - id: rst
      grammar_package: tree-sitter-rst
      file_extensions: [.rst]
      extract_zones: [comment_line, string_literal]

    - id: org
      grammar_package: tree-sitter-org
      file_extensions: [.org]
      extract_zones: [comment_line, string_literal]

    - id: bibtex
      grammar_package: tree-sitter-bibtex
      file_extensions: [.bib]
      extract_zones: [comment_line, string_literal]

    - id: po
      grammar_package: tree-sitter-po
      file_extensions: [.po, .pot]
