    - id: llvm
      grammar_package: tree-sitter-llvm
      file_extensions: [.ll]
      extract_zones: [comment_line, string_literal]

    # ── WebAssembly ───────────────────────────────────────────────────────
    - id: wat
      grammar_package: tree-sitter-wasm
      file_extensions: [.wat, .wast]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Blockchain / Smart contracts ──────────────────────────────────────
    - id: solidity
      grammar_package: tree-sitter-solidity
      file_extensions: [.sol]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: cairo
      grammar_package: tree-sitter-cairo
      file_extensions: [.cairo]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: clarity
      grammar_package: tree-sitter-clarity
      file_extensions: [.clar]
      extract_zones: [comment_line, string_literal]

    - id: func
      grammar_package: tree-sitter-func
      file_extensions: [.fc, .func]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Ruby ecosystem ────────────────────────────────────────────────────
    - id: rbs
      grammar_package: tree-sitter-rbs
      file_extensions: [.rbs]
      extract_zones: [comment_line, string_literal]

    # ── Certificates / Secrets ────────────────────────────────────────────
    - id: pem
      grammar_package: tree-sitter-pem
      file_extensions: [.pem, .cer, .crt, .key, .pub]
      extract_zones: [string_literal]

    # ── Editor config ─────────────────────────────────────────────────────
    - id: vim
      grammar_package: tree-sitter-vim
      file_extensions: [.vim]
      extract_zones: [comment_line, string_literal]

    # ── Android ──────────────────────────────────────────────────────────
    - id: smali
      grammar_package: tree-sitter-smali
      file_extensions: [.smali]
      extract_zones: [comment_line, string_literal]

    # ── Typst ─────────────────────────────────────────────────────────────
    - id: typst
      grammar_package: tree-sitter-typst
      file_extensions: [.typ]
      extract_zones: [comment_line, comment_block, string_literal]

  zone_policy:
    redact_string_literals: true
    min_string_length: 4

  on_parse_error: fallback

fallback_extractor:
  enabled: true
  comment_patterns:
    - pattern: '#.*$'
    - pattern: '//.*$'
    - pattern: '--.*$'
    - pattern: ';.*$'
