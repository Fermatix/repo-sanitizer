    - id: glsl
      grammar_package: tree-sitter-glsl
      file_extensions: [.glsl, .vert, .frag, .comp, .geom, .tesc, .tese]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: hlsl
      grammar_package: tree-sitter-hlsl
      file_extensions: [.hlsl, .fx, .fxh]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: wgsl
      grammar_package: tree-sitter-wgsl
      file_extensions: [.wgsl]
      extract_zones: [comment_line, comment_block]

    - id: slang
      grammar_package: tree-sitter-slang
      file_extensions: [.slang]
      extract_zones: [comment_line, comment_block, string_literal]

    # ── Hardware / EDA ────────────────────────────────────────────────────
    - id: verilog
      grammar_package: tree-sitter-verilog
      file_extensions: [.v, .sv, .svh, .vh]
      extract_zones: [comment_line, comment_block, string_literal]

    - id: vhdl
      grammar_package: tree-sitter-vhdl
      file_extensions: [.vhd, .vhdl]
