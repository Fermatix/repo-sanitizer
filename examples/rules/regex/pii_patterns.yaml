# DO NOT EDIT THIS FILE

patterns:

  # ════════════════════════════════════════════════════════════════
  # PII — Personal Identifiable Information
  # ════════════════════════════════════════════════════════════════

  - name: email
    # Genuine emails only. After the TLD, three lookaheads anchor the match:
    #  (?![A-Za-z0-9])     — TLD label is complete (next char isn't alnum);
    #  (?!\.[A-Za-z0-9])   — and is the LAST label: forbids stopping short of the
    #                        real TLD (so git@gitlab.example.com:a/b.git can't
    #                        match `git@gitlab.example`), while still ALLOWING a
    #                        trailing sentence-dot `foo@bar.com.` (the `.` is not
    #                        followed by another label);
    #  (?!:[^\s@]*/)       — SSH-remote guard: skips ONLY `git@host:owner/repo`
    #                        remotes (a `:` then a path with a `/`); a real email
    #                        followed by `:word`/`:port` (no slash) is still masked.
    # (?!invalid\b) keeps our own `@example.invalid` masks from re-matching.
    pattern: '[a-zA-Z0-9_.+%-]+@(?:[a-zA-Z0-9-]+\.)+(?!invalid\b)[a-zA-Z]{2,}(?![A-Za-z0-9])(?!\.[A-Za-z0-9])(?!:[^\s@]*/)'
    category: PII
    severity: HIGH

  - name: phone_e164
    # Strict E.164: +12345678901  +442071234567  +79161234567
    # Alnum-boundary lookarounds so a '+1…' digit run inside base64/hex is not
    # mistaken for a phone.
    pattern: '(?<![0-9A-Za-z])\+[1-9]\d{6,14}(?![0-9A-Za-z])'
    category: PII
    severity: HIGH

  - name: phone_ru
    # Russian mobile / landline: 8-XXX-XXX-XX-XX  or  8XXXXXXXXXX
    # Alnum-boundary lookarounds so a digit run inside a hex/base64 hash or an
    # all-digit version string is not mistaken for a phone number.
    pattern: '(?<![0-9A-Za-z])(?:8|\+7)[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}(?![0-9A-Za-z])'
    category: PII
    severity: HIGH

  # IPv4/IPv6 are intentionally NOT regex-PII patterns: a blanket IP regex masks
  # loopback/private build infra (127.0.0.1, 192.168.x) and breaks builds. PUBLIC
  # IPs (the real deployment fingerprints) are handled keep-aware + public-only by
  # EndpointDetector (working tree + history-blob scan) AND by the Scrubber's
  # public-IP pass over EVERY history blob (incl. SVG/oversized blobs the scan
  # skips). See detectors/endpoint.py::_is_public_ip and redaction/history_ops.py.

  - name: ssn
    # US Social Security Number: 123-45-6789
    pattern: '\b(?!000|666|9\d{2})\d{3}-(?!00)\d{2}-(?!0000)\d{4}\b'
    category: PII
    severity: CRITICAL

  - name: credit_card
    # Visa / Mastercard / Amex / Discover (no spaces or with spaces/dashes)
    pattern: '\b(?:4\d{3}|5[1-5]\d{2}|3[47]\d{2}|6011|65\d{2})[\s\-]?\d{4}[\s\-]?\d{4}[\s\-]?\d{3,4}\b'
    category: PII
    severity: CRITICAL

  - name: iban
    # Generic IBAN: GB29NWBK60161331926819  DE89370400440532013000
    pattern: '\b[A-Z]{2}\d{2}[A-Z0-9]{4}\d{7}(?:[A-Z0-9]{0,16})\b'
    category: PII
    severity: HIGH

  - name: passport_ru
    # Russian passport: 1234 567890
    pattern: '\b\d{4}\s\d{6}\b'
    category: PII
    severity: CRITICAL

  - name: inn_ru
    # Russian INN (tax ID): 10 or 12 digits
    pattern: '\b(?:ИНН|INN)[:\s]*\d{10,12}\b'
    category: PII
    severity: HIGH

  # ════════════════════════════════════════════════════════════════
  # SECRETS — Credentials, tokens, API keys
  # ════════════════════════════════════════════════════════════════

  - name: jwt
    # JSON Web Token: eyJ…header.eyJ…payload.signature
    pattern: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
    category: SECRET
    severity: CRITICAL

  - name: pem_private_key
    pattern: '-----BEGIN [A-Z ]*PRIVATE KEY-----'
    category: SECRET
    severity: CRITICAL

  - name: aws_access_key_id
    # AWS Access Key ID: AKIA…  ASIA…  AROA…
    pattern: '\b(?:AKIA|ASIA|AROA|AIDA|AGPA|AIPA|ANPA|ANVA|APKA)[0-9A-Z]{16}\b'
    category: SECRET
    severity: CRITICAL

  - name: aws_secret_key
    # AWS Secret Access Key (heuristic — 40-char base64 after keyword)
    pattern: '(?:aws[_\-.]?secret[_\-.]?(?:access[_\-.]?)?key|AWS_SECRET[_\-.]?ACCESS[_\-.]?KEY)["\s:=]+([A-Za-z0-9/+=]{40})'
    category: SECRET
    severity: CRITICAL

  - name: github_token
    # GitHub personal / app / OAuth tokens
    pattern: 'gh[pousr]_[A-Za-z0-9]{36,255}'
    category: SECRET
    severity: CRITICAL

  - name: github_pat_v2
    # Fine-grained GitHub PAT (new format)
    pattern: 'github_pat_[A-Za-z0-9_]{82}'
    category: SECRET
    severity: CRITICAL

  - name: gitlab_token
    # GitLab personal access token
    pattern: 'glpat-[A-Za-z0-9_-]{20}'
    category: SECRET
    severity: CRITICAL

  - name: slack_token
    # Slack Bot / App / User tokens
    pattern: 'xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24}'
    category: SECRET
    severity: CRITICAL

  - name: slack_webhook
    pattern: 'https://hooks\.slack\.com/services/T[A-Za-z0-9]+/B[A-Za-z0-9]+/[A-Za-z0-9]+'
    category: SECRET
    severity: CRITICAL

  - name: stripe_live_key
    pattern: 'sk_live_[A-Za-z0-9]{24,}'
    category: SECRET
    severity: CRITICAL

  - name: stripe_test_key
    pattern: 'sk_test_[A-Za-z0-9]{24,}'
    category: SECRET
    severity: HIGH

  - name: stripe_publishable_key
    pattern: 'pk_(?:live|test)_[A-Za-z0-9]{24,}'
    category: SECRET
    severity: MEDIUM

  - name: sendgrid_api_key
    pattern: 'SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}'
    category: SECRET
    severity: CRITICAL

  - name: google_api_key
    pattern: 'AIza[0-9A-Za-z_-]{35}'
    category: SECRET
    severity: CRITICAL

  - name: google_oauth_token
    pattern: 'ya29\.[A-Za-z0-9_-]{50,}'
    category: SECRET
    severity: CRITICAL

  - name: npm_token
    pattern: 'npm_[A-Za-z0-9]{36}'
    category: SECRET
    severity: CRITICAL

  - name: pypi_token
    pattern: 'pypi-[A-Za-z0-9_-]{40,}'
    category: SECRET
    severity: CRITICAL

  - name: twilio_sid
    # Twilio Account SID
    pattern: '\bAC[a-f0-9]{32}\b'
    category: SECRET
    severity: HIGH

  - name: mailchimp_api_key
    # Mailchimp API key: <32hex>-us<N>
    pattern: '[0-9a-f]{32}-us\d{1,2}'
    category: SECRET
    severity: HIGH

  - name: telegram_bot_token
    pattern: '\b\d{9,10}:[A-Za-z0-9_-]{35}\b'
    category: SECRET
    severity: CRITICAL

  - name: generic_api_key
    # Heuristic: variable named *key/token/secret/password* followed by a long value
    pattern: '(?i)(?:api[_\-.]?key|api[_\-.]?token|access[_\-.]?token|secret[_\-.]?key|auth[_\-.]?token|private[_\-.]?key)["\s:=]+[''"]([A-Za-z0-9_\-+/=]{20,})[''"]'
    category: SECRET
    severity: HIGH

  - name: basic_auth_in_url
    # http://user:password@host
    pattern: 'https?://[A-Za-z0-9_.%+-]+:[A-Za-z0-9_.%+!@#$^&*()-]{4,}@[A-Za-z0-9.-]+'
    category: SECRET
    severity: CRITICAL

  - name: secret_url_param
    # Secret-bearing query parameter in any URL (?token=… &api_key=… &signature=…),
    # incl. AWS/GCP presigned-URL credential params (X-Amz-Signature / X-Amz-
    # Credential / X-Amz-Security-Token / X-Goog-Signature). Replaces the
    # credential-carrying-URL coverage the removed blanket `https_url` gave,
    # WITHOUT masking plain build URLs (nuget/pypi/maven/xmlns) that carry no
    # secret param. Matches the whole `?name=value` span (value included).
    pattern: '(?i)[?&](?:x-amz-signature|x-amz-security-token|x-amz-credential|x-goog-signature|access[_-]?token|api[_-]?key|auth|client[_-]?secret|credential|key|passwd|password|pwd|secret|security[_-]?token|signature|sig|token)=[^&\s"''<>]+'
    category: SECRET
    severity: HIGH

  # ════════════════════════════════════════════════════════════════
  # ENDPOINTS — Connection strings, internal URLs
  # ════════════════════════════════════════════════════════════════

  # `https_url` (blanket http(s):// matcher) was REMOVED — it masked every URL
  # incl. public package infra (nuget/pypi/nodesource/maven) and schema xmlns,
  # breaking builds, without identifying anyone. Credentialed/internal URLs stay
  # covered below (db_connection_*/jdbc_url/basic_auth_in_url/internal_corp_url)
  # and secret-bearing URLs by `secret_url_param` above. Company-identifying URLs
  # fall to the brand/NER layer + the mandatory Pass-2/codex audit.

  - name: db_connection_postgresql
    pattern: 'postgres(?:ql)?://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: db_connection_mysql
    pattern: 'mysql(?:\+[a-z]+)?://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: db_connection_mongodb
    pattern: 'mongodb(?:\+srv)?://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: db_connection_redis
    pattern: 'redis(?:s)?://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: db_connection_amqp
    pattern: 'amqps?://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: jdbc_url
    pattern: 'jdbc:[a-z]+://[^\s"''<>]+'
    category: ENDPOINT
    severity: HIGH

  - name: internal_corp_url
    # URLs with .internal / .corp / .local TLDs
    pattern: 'https?://[a-z0-9.-]+\.(?:internal|corp|local|intranet|lan)[/\s"''<>]?'
    category: ENDPOINT
    severity: MEDIUM

  # ════════════════════════════════════════════════════════════════
  # DICTIONARY — Internal identifiers (ticket numbers, refs)
  # ════════════════════════════════════════════════════════════════

  - name: jira_ticket
    # JIRA-style: PROJECT-1234. The negative lookahead excludes common
    # standards/charset/spec tokens of the same UPPER-DIGITS shape (UTF-8,
    # SHA-256, ISO-8601, RFC-2616, ECMA-262, BASE-64, HTTP-2, GB-2312, IEEE-754,
    # PEP-8 …) — masking those into a placeholder corrupts build/config files
    # (e.g. an XML/HTML `encoding="UTF-8"`). DICTIONARY/MEDIUM, so tightening is
    # leak-safe (these are not PII). A real ticket key matching a listed prefix
    # is the only (rare) cost.
    pattern: '\b(?!(?:UTF|SHA|ISO|IEC|RFC|ECMA|BASE|HTTP|GB|EUC|UCS|IEEE|PEP|MD|CP|WIN|ANSI|TLS|SSL)-\d)[A-Z]{2,10}-\d{1,6}\b'
    category: DICTIONARY
    severity: MEDIUM

  - name: github_issue_ref
    # #123  or  org/repo#123
    pattern: '(?:[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)?#\d{1,6}'
    category: DICTIONARY
    severity: LOW

  # `uuid` was REMOVED — GUIDs are opaque/non-identifying and masking them breaks
  # .sln/MSBuild project references (dotnet build). Tenant/device-correlating
  # UUIDs are a residual covered by the mandatory Pass-2/codex audit.
