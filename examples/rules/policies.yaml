# DO NOT EDIT THIS FILE

deny_globs:
  # ── Environment & secrets ─────────────────────────────────────────────────
  - "**/.env"               # plain .env
  - "**/.env.*"             # .env.local  .env.production  .env.staging …
  - "**/secrets.*"          # secrets.yaml  secrets.json  secrets.sh
  - "**/credentials"        # bare "credentials" (AWS SDK, GCP ADC)
  - "**/credentials.*"      # credentials.json  credentials.yaml
  - "**/*.credentials"      # something.credentials
  - "**/secret.*"           # secret.yaml  secret.json
  - "**/private.*"          # private.key  private.json

  # ── Application config files (often contain DSNs / passwords) ─────────────
  - "**/config.*"                   # config.yaml  config.prod.json …
  - "**/settings.*"                 # settings.py  settings.yaml
  - "**/application.*"              # Spring Boot: application.properties/yaml
  - "**/application-prod.*"
  - "**/application-production.*"
  - "**/application-staging.*"
  - "**/application-release.*"
  - "**/local_settings.*"           # Django local_settings.py
  - "**/database.*"                 # database.yml  database.json
  - "**/database.php"
  - "**/*.local"                    # vite.config.local  next.config.local …

  # ── Cryptographic material ────────────────────────────────────────────────
  - "**/*.key"
  - "**/*.pem"
  - "**/*.crt"
  - "**/*.cer"
  - "**/*.p12"
  - "**/*.pfx"
  - "**/*.jks"
  - "**/*.keystore"
  - "**/*.p8"               # Apple APNs private key
  - "**/*.der"
  - "**/*.ppk"              # PuTTY private key

  # ── SSH keys (default names) ──────────────────────────────────────────────
  - "**/id_rsa"
  - "**/id_ed25519"
  - "**/id_ecdsa"
  - "**/id_dsa"
  - "**/id_xmss"

  # ── Cloud / infra credentials ─────────────────────────────────────────────
  - "**/.boto"                      # AWS/GCS boto config
  - "**/*.token"
  - "**/token.*"
  - "**/auth.json"
  - "**/service-account.json"
  - "**/*service_account*.json"
  - "**/*serviceaccount*.json"
  - "**/*gcp*.json"

  # ── Auth / token files ────────────────────────────────────────────────────
  - "**/.npmrc"
  - "**/.pypirc"
  - "**/.netrc"
  - "**/.gitcredentials"
  - "**/.htpasswd"

  # ── Kubernetes ────────────────────────────────────────────────────────────
  - "**/kubeconfig"
  - "**/*.kubeconfig"

  # ── Terraform ─────────────────────────────────────────────────────────────
  - "**/*.tfvars"
  - "**/*.tfvars.json"
  - "**/terraform.tfstate"
  - "**/terraform.tfstate.backup"
  - "**/override.tf"
  - "**/override.tf.json"

  # ── Ansible ───────────────────────────────────────────────────────────────
  - "**/vault.yml"
  - "**/vault.yaml"
  - "**/*vault*"

  # ── Git special files ─────────────────────────────────────────────────────
  - "**/.mailmap"
  - "**/CODEOWNERS"

# ── Allow-suffixes: keep file in place but scan it ─────────────────────────
allow_suffixes:
  - ".example"
  - ".sample"
  - ".template"
  - ".dist"
  - ".defaults"

# ── Binary extensions to DELETE from history ──────────────────────────────
binary_deny_extensions:
  # Executables
  - exe
  - dll
  - so
  - dylib
  - bin
  - out
  - elf
  - com
  # Java bytecode & packages
  - class
  - jar
  - war
  - ear
  # Compiled Python
  - pyc
  - pyo
  - pyd
  # Archives
  - zip
  - gz
  - tgz
  - bz2
  - xz
  - tar
  - rar
  - 7z
  - zst
  # OS packages
  - deb
  - rpm
  - pkg
  - msi
  - appimage
  - dmg
  # Databases
  - db
  - sqlite
  - sqlite3
  - mdb
  - accdb
  - ldb
  # Office documents (may contain embedded metadata)
  - pdf
  - doc
  - docx
  - xls
  - xlsx
  - ppt
  - pptx
  - odt
  - ods
  - odp
  # Object files / static libs
  - o
  - a
  - lib
  # WebAssembly (compiled)
  - wasm
  # Large design files
  - psd
  - ai
  - sketch
  - fig
  - xd
  # Misc binary formats
  - dat
  - dump
  - img
  - iso

# ── Binary extensions to KEEP (images, fonts, etc.) ───────────────────────
binary_allow_extensions:
  # Raster images
  - png
  - jpg
  - jpeg
  - gif
  - webp
  - bmp
  - tiff
  - tif
  - avif
  - heic
  - ico
  # Vector / web images
  - svg
  # Fonts
  - ttf
  - otf
  - woff
  - woff2
  - eot

# ── NER (Named-Entity Recognition) ───────────────────────────────────────
ner:
  backend: hf      # "hf" (HuggingFace transformers) or "gliner" (recommended)
  model: Babelscape/wikineural-multilingual-ner
  min_score: 0.5
  entity_types: [PER, ORG]
  device: cuda:0

max_file_mb: 20
